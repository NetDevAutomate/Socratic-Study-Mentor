<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artefacts — Socratic-Study-Mentor</title>
<style>
  :root { --bg: #0d1117; --fg: #e6edf3; --card: #161b22; --border: #30363d; --accent: #58a6ff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
         background: var(--bg); color: var(--fg); padding: 2rem; max-width: 900px; margin: 0 auto; }
  h1 { margin-bottom: .5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; }
  .subtitle a { color: var(--accent); text-decoration: none; }
  section { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            padding: 1.5rem; margin-bottom: 1.5rem; }
  section h2 { margin-bottom: 1rem; font-size: 1.1rem; }
  audio, video { width: 100%; border-radius: 4px; }
  img.artefact { max-width: 100%; border-radius: 4px; }
  .pdf-link { display: inline-block; padding: .5rem 1rem; background: var(--accent);
              color: var(--bg); border-radius: 4px; text-decoration: none; font-weight: 600; }
  .hidden { display: none; }
</style>
</head>
<body>
<h1>📚 Generated Artefacts</h1>
<p class="subtitle"><a href="../../">← Back to repository</a></p>

<section id="s-audio">
  <h2>🎧 Audio Overview</h2>
  <audio controls preload="metadata" id="audio"></audio>
</section>

<section id="s-video">
  <h2>🎬 Video Overview</h2>
  <video controls preload="metadata" id="video"></video>
</section>

<section id="s-infographic">
  <h2>🖼️ Infographic</h2>
  <img id="infographic" class="artefact" alt="Infographic">
</section>

<section id="s-slides">
  <h2>📊 Slide Deck</h2>
  <a id="slides" class="pdf-link" target="_blank">Open PDF ↗</a>
</section>

<script>
// Standard artefact names — same convention across all repos
const ARTEFACTS = {
  audio:       { el: 'audio',        section: 's-audio',       attr: 'src',  exts: ['.m4a', '.mp3'] },
  video:       { el: 'video',        section: 's-video',       attr: 'src',  exts: ['.mp4', '.webm'] },
  infographic: { el: 'infographic',  section: 's-infographic', attr: 'src',  exts: ['.png', '.jpg', '.webp'] },
  slides:      { el: 'slides',       section: 's-slides',      attr: 'href', exts: ['.pdf'] },
};

// Try standard names: audio_overview.m4a, video_overview.mp4, infographic.png, slides.pdf
async function probe(base, exts) {
  for (const ext of exts) {
    const url = base + ext;
    try {
      const r = await fetch(url, { method: 'HEAD' });
      if (r.ok) return url;
    } catch {}
  }
  return null;
}

(async () => {
  for (const [key, cfg] of Object.entries(ARTEFACTS)) {
    const url = await probe(key === 'audio' ? 'audio_overview' :
                            key === 'video' ? 'video_overview' :
                            key, cfg.exts);
    if (url) {
      document.getElementById(cfg.el)[cfg.attr] = url;
    } else {
      document.getElementById(cfg.section).classList.add('hidden');
    }
  }
})();
</script>
</body>
</html>
